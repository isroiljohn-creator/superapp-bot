<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Dumaloq Video — NUVI Tools</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  /* ── Light theme (default) ── */
  :root {
    --bg-primary: #f3f4f6;
    --bg-card: #ffffff;
    --bg-card-border: #e5e7eb;
    --bg-card-shadow: rgba(0,0,0,0.04);
    --accent: #42a5f5;
    --accent-dark: #1e88e5;
    --accent-glow: rgba(66,165,245,0.25);
    --accent-bg: rgba(66,165,245,0.04);
    --accent-info-bg: rgba(66,165,245,0.06);
    --accent-info-border: rgba(66,165,245,0.15);
    --success: #22c55e;
    --success-bg: rgba(34,197,94,0.03);
    --success-border: rgba(34,197,94,0.4);
    --error: #ef4444;
    --error-bg: rgba(239,68,68,0.03);
    --error-border: rgba(239,68,68,0.4);
    --text-primary: #1e1e1e;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --upload-dash: #d1d5db;
    --progress-track: #e5e7eb;
    --shimmer: rgba(255,255,255,0.4);
    --spinner-bg: rgba(66,165,245,0.3);
    --radius: 16px;
  }

  /* ── Dark theme ── */
  [data-theme="dark"] {
    --bg-primary: #0f0f1a;
    --bg-card: rgba(255,255,255,0.05);
    --bg-card-border: rgba(255,255,255,0.08);
    --bg-card-shadow: rgba(0,0,0,0.2);
    --accent-bg: rgba(66,165,245,0.08);
    --accent-info-bg: rgba(66,165,245,0.08);
    --accent-info-border: rgba(66,165,245,0.2);
    --success-bg: rgba(34,197,94,0.08);
    --success-border: rgba(34,197,94,0.3);
    --error-bg: rgba(239,68,68,0.08);
    --error-border: rgba(239,68,68,0.3);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --upload-dash: rgba(255,255,255,0.15);
    --progress-track: rgba(255,255,255,0.08);
    --shimmer: rgba(255,255,255,0.2);
    --spinner-bg: rgba(66,165,245,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  .container {
    position: relative;
    max-width: 420px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  .header { text-align: center; margin-bottom: 28px; }
  .header-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    box-shadow: 0 8px 32px var(--accent-glow);
    animation: iconPulse 3s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%,100% { box-shadow: 0 8px 32px var(--accent-glow); }
    50% { box-shadow: 0 12px 48px var(--accent-glow); }
  }
  .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: var(--text-primary); }
  .header p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  .upload-zone {
    border: 2px dashed var(--upload-dash);
    border-radius: var(--radius);
    background: var(--bg-card);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 1px 3px var(--bg-card-shadow);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-bg);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--accent-glow);
  }
  .upload-icon { margin: 0 auto 12px; display: block; width: 48px; height: 48px; }
  .upload-icon svg { width: 48px; height: 48px; }
  .upload-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
  .upload-subtitle { font-size: 12px; color: var(--text-muted); }
  .upload-zone input { display: none; }

  .file-info {
    display: none; background: var(--bg-card); border: 1px solid var(--bg-card-border);
    border-radius: var(--radius); padding: 16px; margin-top: 16px;
    box-shadow: 0 1px 3px var(--bg-card-shadow); animation: slideUp 0.3s ease;
  }
  .file-info.show { display: block; }
  @keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .file-row { display: flex; align-items: center; gap: 12px; }
  .file-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .file-details { flex: 1; min-width: 0; }
  .file-name { font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .file-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; transition: color 0.2s; }
  .file-remove:hover { color: var(--error); }

  .progress-box { display: none; margin-top: 16px; animation: slideUp 0.3s ease; }
  .progress-box.show { display: block; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
  .progress-label span:first-child { color: var(--text-secondary); }
  .progress-label span:last-child { color: var(--accent-dark); font-weight: 600; }
  .progress-track { height: 8px; background: var(--progress-track); border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-dark));
    border-radius: 4px; transition: width 0.3s ease; position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, var(--shimmer), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  .status-msg { display: none; text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-secondary); animation: slideUp 0.3s ease; }
  .status-msg.show { display: block; }
  .status-msg.processing .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--spinner-bg); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    display: none; text-align: center; padding: 32px 20px; margin-top: 16px;
    background: var(--bg-card); border: 1px solid var(--bg-card-border);
    border-radius: var(--radius); box-shadow: 0 1px 3px var(--bg-card-shadow); animation: slideUp 0.4s ease;
  }
  .result-card.show { display: block; }
  .result-card.success { border-color: var(--success-border); background: var(--success-bg); }
  .result-card.error { border-color: var(--error-border); background: var(--error-bg); }
  .result-icon { margin: 0 auto 12px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; }
  .result-icon svg { width: 56px; height: 56px; }
  .result-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text-primary); }
  .result-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  .upload-btn {
    display: none; width: 100%; padding: 16px; margin-top: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border: none; border-radius: 14px; color: white; font-size: 16px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all 0.3s ease;
    box-shadow: 0 4px 24px var(--accent-glow); animation: slideUp 0.3s ease;
  }
  .upload-btn.show { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--accent-glow); }
  .upload-btn:active { transform: translateY(0); }
  .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .info-box {
    margin-top: 20px; padding: 14px 16px;
    background: var(--accent-info-bg); border: 1px solid var(--accent-info-border);
    border-radius: 12px; font-size: 12px; color: var(--text-secondary); line-height: 1.6;
  }
  .info-box b { color: var(--text-primary); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="white" stroke="none"/></svg>
    </div>
    <h1 id="t_title"></h1>
    <p id="t_subtitle"></p>
  </div>

  <div class="upload-zone" id="dropZone">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="upload-title" id="t_selectVideo"></div>
    <div class="upload-subtitle" id="t_dragDrop"></div>
    <input type="file" id="fileInput" accept="video/*"/>
  </div>

  <div class="file-info" id="fileInfo">
    <div class="file-row">
      <div class="file-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
      </div>
      <div class="file-details">
        <div class="file-name" id="fileName">—</div>
        <div class="file-size" id="fileSize">—</div>
      </div>
      <button class="file-remove" id="fileRemove">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="progress-box" id="progressBox">
    <div class="progress-label">
      <span id="progressLabel"></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="result-card" id="resultCard">
    <span class="result-icon" id="resultIcon"></span>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-desc" id="resultDesc"></div>
  </div>

  <button class="upload-btn" id="uploadBtn">
    <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="white" stroke="none"/></svg>
    <span id="t_btnConvert"></span>
  </button>

  <div class="info-box" id="t_infoBox"></div>
</div>

<script>
const tg = window.Telegram?.WebApp;

// ── i18n ──
const i18n = {
  uz: {
    title: "Dumaloq Video",
    subtitle: "Katta hajmdagi videolarni dumaloq (Video Note) formatiga aylantiring",
    selectVideo: "Videoni tanlang",
    dragDrop: "yoki shu yerga tashlang • 100 MB gacha",
    btnConvert: "Dumaloq qilish",
    uploading: "Yuklanmoqda...",
    processing: "Serverda qayta ishlanmoqda...",
    processingSpinner: "Video serverda dumaloq qilinmoqda...",
    successTitle: "Tayyor!",
    successDesc: "Dumaloq video Telegram chatga yuborildi. Iltimos chat oynasini tekshiring!",
    errorFormat: "Noto'g'ri format",
    errorFormatDesc: "Iltimos, faqat video fayl yuboring.",
    errorSize: "Hajm juda katta",
    errorSizeDesc: "100 MB dan katta video qabul qilinmaydi.",
    errorTitle: "Xatolik",
    errorNetwork: "Tarmoq xatoligi",
    errorNetworkDesc: "Internetga ulanishni tekshiring va qayta urinib ko'ring.",
    errorUnknown: "Noma'lum xatolik",
    infoBox: '<svg style="width:14px;height:14px;vertical-align:middle;margin-right:4px;margin-top:-2px" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> <b>Qanday ishlaydi?</b><br/>1. Videoni tanlang (100 MB gacha).<br/>2. "Dumaloq qilish" tugmasini bosing.<br/>3. Server videoni qayta ishlaydi va Telegram chatga dumaloq qilib yuborib beradi!',
  },
  ru: {
    title: "Круглое видео",
    subtitle: "Конвертируйте видео большого размера в круглое (Video Note) сообщение",
    selectVideo: "Выберите видео",
    dragDrop: "или перетащите сюда • до 100 МБ",
    btnConvert: "Сделать круглым",
    uploading: "Загружается...",
    processing: "Обработка на сервере...",
    processingSpinner: "Видео обрабатывается на сервере...",
    successTitle: "Готово!",
    successDesc: "Круглое видео отправлено в Telegram чат. Проверьте окно чата!",
    errorFormat: "Неверный формат",
    errorFormatDesc: "Пожалуйста, отправьте только видеофайл.",
    errorSize: "Слишком большой размер",
    errorSizeDesc: "Видео больше 100 МБ не принимается.",
    errorTitle: "Ошибка",
    errorNetwork: "Ошибка сети",
    errorNetworkDesc: "Проверьте подключение к интернету и попробуйте снова.",
    errorUnknown: "Неизвестная ошибка",
    infoBox: '<svg style="width:14px;height:14px;vertical-align:middle;margin-right:4px;margin-top:-2px" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> <b>Как это работает?</b><br/>1. Выберите видео (до 100 МБ).<br/>2. Нажмите кнопку "Сделать круглым".<br/>3. Сервер обработает видео и отправит его круглым в Telegram чат!',
  }
};

// ── Detect language & theme ──
let lang = 'uz';
if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
  const lc = tg.initDataUnsafe.user.language_code || '';
  if (lc === 'ru' || lc === 'uk' || lc === 'be' || lc === 'kk') lang = 'ru';
}
const t = i18n[lang];

// Apply theme
const isDark = tg ? tg.colorScheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
if (isDark) document.documentElement.setAttribute('data-theme', 'dark');

if (tg) {
  tg.ready();
  tg.expand();
  const bgColor = isDark ? '#0f0f1a' : '#f3f4f6';
  tg.setHeaderColor(bgColor);
  tg.setBackgroundColor(bgColor);
}

// ── Apply translations ──
document.getElementById('t_title').textContent = t.title;
document.getElementById('t_subtitle').textContent = t.subtitle;
document.getElementById('t_selectVideo').textContent = t.selectVideo;
document.getElementById('t_dragDrop').textContent = t.dragDrop;
document.getElementById('t_btnConvert').textContent = t.btnConvert;
document.getElementById('progressLabel').textContent = t.uploading;
document.getElementById('t_infoBox').innerHTML = t.infoBox;

// ── App Logic ──
const MAX_SIZE = 100 * 1024 * 1024;
let selectedFile = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const fileRemove = document.getElementById('fileRemove');
const progressBox = document.getElementById('progressBox');
const progressLabel = document.getElementById('progressLabel');
const progressPct = document.getElementById('progressPct');
const progressFill = document.getElementById('progressFill');
const statusMsg = document.getElementById('statusMsg');
const resultCard = document.getElementById('resultCard');
const resultIcon = document.getElementById('resultIcon');
const resultTitle = document.getElementById('resultTitle');
const resultDesc = document.getElementById('resultDesc');
const uploadBtn = document.getElementById('uploadBtn');

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + (lang === 'ru' ? ' МБ' : ' MB');
}

function selectFile(file) {
  if (!file || !file.type.startsWith('video/')) {
    showResult('error', 'error', t.errorFormat, t.errorFormatDesc);
    return;
  }
  if (file.size > MAX_SIZE) {
    showResult('error', 'error', t.errorSize, t.errorSizeDesc);
    return;
  }
  selectedFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = formatSize(file.size);
  fileInfo.classList.add('show');
  uploadBtn.classList.add('show');
  resultCard.classList.remove('show');
}

function resetUI() {
  selectedFile = null;
  fileInfo.classList.remove('show');
  uploadBtn.classList.remove('show');
  progressBox.classList.remove('show');
  statusMsg.classList.remove('show');
  resultCard.classList.remove('show');
  uploadBtn.disabled = false;
  progressFill.style.width = '0%';
}

function showResult(type, icon, title, desc) {
  resultCard.className = 'result-card show ' + type;
  if (icon === 'success') {
    resultIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
  } else {
    resultIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
  }
  resultTitle.textContent = title;
  resultDesc.textContent = desc;
}

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) selectFile(fileInput.files[0]); });
fileRemove.addEventListener('click', resetUI);

uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  uploadBtn.disabled = true;
  progressBox.classList.add('show');
  progressLabel.textContent = t.uploading;
  statusMsg.classList.remove('show');
  resultCard.classList.remove('show');

  const formData = new FormData();
  formData.append('video', selectedFile);
  const xhr = new XMLHttpRequest();
  xhr.open('POST', window.location.origin + '/api/tools/videonote');
  if (tg && tg.initData) xhr.setRequestHeader('Authorization', 'tma ' + tg.initData);

  xhr.upload.addEventListener('progress', (e) => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      progressFill.style.width = pct + '%';
      progressPct.textContent = pct + '%';
      if (pct >= 100) progressLabel.textContent = t.processing;
    }
  });

  xhr.addEventListener('load', () => {
    progressBox.classList.remove('show');
    statusMsg.classList.remove('show');
    if (xhr.status === 200) {
      showResult('success', 'success', t.successTitle, t.successDesc);
      uploadBtn.classList.remove('show');
      fileInfo.classList.remove('show');
      setTimeout(() => { if (tg) tg.close(); }, 3000);
    } else {
      let msg = t.errorUnknown;
      try { msg = JSON.parse(xhr.responseText).detail || msg; } catch(e) {}
      showResult('error', 'error', t.errorTitle, msg);
      uploadBtn.disabled = false;
    }
  });

  xhr.addEventListener('error', () => {
    progressBox.classList.remove('show');
    statusMsg.classList.remove('show');
    showResult('error', 'error', t.errorNetwork, t.errorNetworkDesc);
    uploadBtn.disabled = false;
  });

  xhr.send(formData);

  setTimeout(() => {
    if (progressFill.style.width === '100%') {
      statusMsg.innerHTML = '<span class="spinner"></span> ' + t.processingSpinner;
      statusMsg.className = 'status-msg show processing';
    }
  }, 2000);
});
</script>
</body>
</html>
