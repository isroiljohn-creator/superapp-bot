[phases.setup]
nixPkgs = ["python311", "nodejs_20", "gcc", "git"]

[phases.install]
cmds = [
    "echo '🔄 Initializing submodules...'",
    "git submodule update --init --recursive || echo '⚠️ Submodule update failed, continuing...'",
    "python3 -m venv .venv",
    ".venv/bin/pip install --no-binary greenlet -r requirements.txt",
    "echo '📦 Installing dependencies...'",
    "cd frontend && npm install",
    "cd yasha-insights && npm install"
]

[phases.build]
cmds = [
    "echo '🚀 Starting Main Frontend Build...'",
    "cd frontend && npm run build",
    "echo '🚀 Starting Admin Insights Build...'",
    "cd yasha-insights && npm run build",
    "echo '✅ All Frontends Built'",
    "ls -d frontend/dist yasha-insights/dist"
]

[start]
cmd = "alembic upgrade head && .venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
