[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20", "gcc"]

[phases.install]
cmds = [
    "python3 -m ensurepip",
    "python3 -m pip install -r requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "echo '🚀 Starting Frontend Build...'",
    "cd frontend && npm install && npm run build",
    "echo '✅ Frontend Build Complete'",
    "ls -R frontend/dist"
]

[start]
cmd = "if [ ! -d 'frontend/dist' ]; then echo '⚠️ frontend/dist missing, building now...'; cd frontend && npm install && npm run build && cd ..; fi && python3 -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
