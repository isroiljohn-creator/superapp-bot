[phases.setup]
nixPkgs = ["python311", "gcc", "postgresql", "rustc", "cargo", "pkg-config", "openssl", "pip", "nodejs_20"]

[phases.install]
cmds = ["python3.11 -m pip install -r requirements.txt", "cd miniapp/admin-dashboard && npm install"]

[phases.build]
cmds = ["cd miniapp/admin-dashboard && npm run build", "mkdir -p api/static/admin", "cp -r miniapp/admin-dashboard/dist/* api/static/admin/"]
