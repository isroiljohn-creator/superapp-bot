[phases.setup]
nixPkgs = ["python311", "nodejs_20", "gcc"]

[phases.install]
cmds = [
    "python3 -m venv .venv",
    ".venv/bin/pip install --no-binary greenlet -r requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "echo '🚀 Starting Frontend Build...'",
    "cd frontend && npm install && npm run build",
    "echo '✅ Frontend Build Complete'",
    "ls -R frontend/dist"
]

[start]
cmd = "if [ ! -d 'frontend/dist' ]; then echo '⚠️ frontend/dist missing, building now...'; cd frontend && npm install && npm run build && cd ..; fi && .venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
